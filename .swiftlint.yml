# AuraKit — SwiftLint Configuration

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

# ─── Enabled Opt-In Rules ──────────────────────────────────────────────────────
opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - first_where
  - force_unwrapping
  - identical_operands
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# ─── Disabled Rules ────────────────────────────────────────────────────────────
disabled_rules:
  - todo             # TODOs allowed during active development sprints
  - trailing_comma   # Team preference: no trailing commas

# ─── Rule Configuration ────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 60

type_body_length:
  warning: 250
  error: 400

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - n
    - t

# ─── Custom Rules ──────────────────────────────────────────────────────────────
custom_rules:
  no_dispatch_queue:
    name: "No DispatchQueue"
    message: "Use Swift 6 Actors instead of DispatchQueue for concurrency."
    regex: "DispatchQueue"
    severity: error

  no_ns_lock:
    name: "No NSLock"
    message: "Use Swift 6 Actors instead of NSLock for synchronization."
    regex: "NSLock|NSRecursiveLock"
    severity: error

  no_unchecked_sendable:
    name: "No @unchecked Sendable"
    message: "Do not use @unchecked Sendable. Make the type genuinely Sendable."
    regex: "@unchecked Sendable"
    severity: error

  prefer_async_await:
    name: "Prefer async/await"
    message: "Use async/await instead of completion handlers."
    regex: "completionHandler|@escaping.*->.*Void\)"
    severity: warning
